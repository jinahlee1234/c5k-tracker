<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Couch to 5K for AI Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --orange: #E87722;
  --orange-light: #FFF3EA;
  --orange-mid: #FDDFC8;
  --bg: #FAFAF8;
  --surface: #FFFFFF;
  --border: #E8E6E0;
  --text: #1A1A18;
  --muted: #888780;
  --success: #3B6D11;
  --success-bg: #EAF3DE;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 20px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-dot { width: 28px; height: 28px; background: var(--orange); border-radius: 50%; }
.logo h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
.logo span { font-size: 13px; color: var(--muted); font-family: 'DM Mono', monospace; }
.header-stats { display: flex; gap: 24px; }
.hstat { text-align: right; }
.hstat-val { font-size: 22px; font-weight: 600; color: var(--orange); font-family: 'DM Mono', monospace; }
.hstat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

main { max-width: 1200px; margin: 0 auto; padding: 28px 24px; }

.add-bar {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 20px;
  display: flex;
  gap: 10px;
  margin-bottom: 24px;
  align-items: center;
}
.add-bar input {
  flex: 1;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 9px 14px;
  font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
}
.add-bar input:focus { border-color: var(--orange); }
.add-bar input::placeholder { color: var(--muted); }
.btn-primary {
  background: var(--orange);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 9px 20px;
  font-size: 14px;
  font-weight: 500;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  white-space: nowrap;
  transition: opacity 0.15s;
}
.btn-primary:hover { opacity: 0.88; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-secondary {
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 9px 16px;
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s;
}
.btn-secondary:hover { background: var(--bg); }

.week-nav {
  display: flex;
  gap: 6px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.week-btn {
  padding: 7px 16px;
  border-radius: 20px;
  border: 1px solid var(--border);
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  background: var(--surface);
  color: var(--muted);
  transition: all 0.15s;
}
.week-btn:hover { border-color: var(--orange); color: var(--orange); }
.week-btn.active { background: var(--orange); color: #fff; border-color: var(--orange); }

.table-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead tr { background: var(--bg); border-bottom: 1px solid var(--border); }
th {
  padding: 10px 8px;
  font-weight: 500;
  font-size: 11px;
  color: var(--muted);
  text-align: center;
  white-space: nowrap;
  text-transform: uppercase;
  letter-spacing: 0.4px;
}
th.name-col { text-align: left; padding-left: 20px; min-width: 130px; }
th.prog-col { min-width: 110px; }
td { padding: 10px 8px; border-bottom: 1px solid var(--border); text-align: center; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #FAFAF8; }
td.name-col {
  text-align: left;
  padding-left: 20px;
  font-weight: 500;
  font-size: 14px;
  color: var(--text);
  min-width: 130px;
}
.day-cell {
  cursor: pointer;
  font-size: 15px;
  width: 34px;
  min-width: 34px;
  border-radius: 6px;
  transition: background 0.1s;
  position: relative;
}
.day-cell:hover { background: var(--orange-light); }
.day-cell.done { color: #3B6D11; }
.day-cell.loading { opacity: 0.4; pointer-events: none; }

.progress-col { min-width: 110px; padding: 10px 12px; }
.prog-bar { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 4px; }
.prog-fill { height: 100%; background: var(--orange); border-radius: 3px; transition: width 0.3s; }
.prog-text { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }

.remove-btn {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 16px;
  padding: 4px 8px;
  border-radius: 6px;
  line-height: 1;
  transition: all 0.15s;
}
.remove-btn:hover { background: #FEE2E2; color: #B91C1C; }

.day-head { line-height: 1.3; }
.day-num { font-weight: 600; font-size: 12px; font-family: 'DM Mono', monospace; color: var(--text); display: block; }
.day-title-tip { font-size: 10px; color: var(--muted); font-weight: 400; display: block; max-width: 60px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.empty-state {
  text-align: center;
  padding: 48px 24px;
  color: var(--muted);
}
.empty-state p { font-size: 15px; margin-bottom: 8px; }
.empty-state small { font-size: 13px; }

.loading-overlay {
  text-align: center;
  padding: 48px;
  color: var(--muted);
  font-size: 14px;
}

.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--text);
  color: #fff;
  padding: 10px 18px;
  border-radius: 8px;
  font-size: 13px;
  opacity: 0;
  transform: translateY(8px);
  transition: all 0.2s;
  pointer-events: none;
  z-index: 999;
}
.toast.show { opacity: 1; transform: translateY(0); }

.week-badge {
  display: inline-block;
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 10px;
  background: var(--orange-mid);
  color: var(--orange);
  font-weight: 500;
  margin-left: 6px;
  vertical-align: middle;
}

.info-bar {
  border-radius: 12px;
  padding: 10px 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  margin-bottom: 16px;
}
.info-bar a {
  color: var(--orange);
  font-size: 14px;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 4px;
}
.info-bar a:hover { text-decoration: underline; }


footer {
  text-align: center;
  padding: 32px 24px 40px;
  font-size: 12px;
  color: var(--muted);
  line-height: 1.8;
}
footer a { color: var(--muted); text-decoration: underline; }
footer a:hover { color: var(--text); }

@media (max-width: 600px) {
  header { padding: 16px; }
  main { padding: 16px 12px; }
  .header-stats { gap: 16px; }
  .hstat-val { font-size: 18px; }
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    <div>
      <h1>Couch to 5K for AI Tracker</h1>
      <span>Progress tracker for your 30 day AI challenge</span>
    </div>
  </div>
  <div class="header-stats">
    <div class="hstat">
      <div class="hstat-val" id="stat-members">—</div>
      <div class="hstat-label">Participants</div>
    </div>
    <div class="hstat">
      <div class="hstat-val" id="stat-completions">—</div>
      <div class="hstat-label">Completions</div>
    </div>
    <div class="hstat">
      <div class="hstat-val" id="stat-leader">—</div>
      <div class="hstat-label">Leading</div>
    </div>
  </div>
</header>

<main>
  <div class="info-bar">
    <span style="font-size:14px;color:var(--muted);">4 weeks · 30 exercises · 10 min/day</span>
    <a href="https://couchto5k.ai" target="_blank">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      View the challenge at couchto5k.ai
    </a>
  </div>

  <div class="add-bar">
    <input type="text" id="nameInput" placeholder="Enter your name to join..." maxlength="40" />
    <button class="btn-primary" id="addBtn" onclick="addMember()">+ Join</button>
  </div>

  <div class="week-nav" id="weekNav"></div>

  <div class="table-card">
    <div class="table-wrap">
      <table id="mainTable">
        <thead id="thead"></thead>
        <tbody id="tbody">
          <tr><td colspan="35" class="loading-overlay">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<footer>
  <div>Vibe coded by <a href="https://www.linkedin.com/in/jinahlee1234" target="_blank">Jin Ah Lee</a> · <a href="https://github.com/jinahlee1234/c5k-tracker/issues" target="_blank">Report issues</a></div>
  <div>Challenge originally created by <a href="https://www.linkedin.com/in/hilarygridley/" target="_blank">Hilary Gridley</a> · <a href="https://couchto5k.ai" target="_blank">couchto5k.ai</a></div>
</footer>

<script>
const API = "https://script.google.com/macros/s/AKfycbzVCd7OeQEV-vdEHF9Ohi-gLAnKek_0vHT1ll4hiivd1CYyWsHGN1qZHbNVCAyNu6mnLQ/exec";

const DAYS = [
  { day: 0, week: 1, title: "Get a paid Claude account" },
  { day: 1, week: 1, title: "Learn Your First Prompting Technique" },
  { day: 2, week: 1, title: "See the Power of Context" },
  { day: 3, week: 1, title: "Have AI Do the Research First" },
  { day: 4, week: 1, title: "How to Catch AI Mistakes" },
  { day: 5, week: 1, title: "Teach It Your Standards" },
  { day: 6, week: 1, title: "Learn to Troubleshoot" },
  { day: 7, week: 1, title: "From Chat to Action" },
  { day: 8, week: 2, title: "Teach AI Who You Are" },
  { day: 9, week: 2, title: "Set Up Voice Input" },
  { day: 10, week: 2, title: "Track Your To-Dos" },
  { day: 11, week: 2, title: "Connect Your Calendar" },
  { day: 12, week: 2, title: "Plan Your Day" },
  { day: 13, week: 2, title: "End Your Day" },
  { day: 14, week: 2, title: "Connect Your Inbox" },
  { day: 15, week: 3, title: "Teach AI Who You Work With" },
  { day: 16, week: 3, title: "Profile Your Manager" },
  { day: 17, week: 3, title: "Automate Your Weekly Update" },
  { day: 18, week: 3, title: "Improve It with Feedback" },
  { day: 19, week: 3, title: "Share What You Built" },
  { day: 20, week: 3, title: "See What AI Learned About You" },
  { day: 21, week: 3, title: "Decide What to Automate" },
  { day: 22, week: 4, title: "Pick and Scope a Personalized Skill" },
  { day: 23, week: 4, title: "Build Your Personalized Skill" },
  { day: 24, week: 4, title: "Iterate on Your Skill Until It Works" },
  { day: 25, week: 4, title: "Build a Feedback Tool" },
  { day: 26, week: 4, title: "Build a Utility Tool" },
  { day: 27, week: 4, title: "Make the System Self-Improving" },
  { day: 28, week: 4, title: "Teach a Friend" },
  { day: 29, week: 4, title: "Prep Your Demo" },
  { day: 30, week: 4, title: "Cross the Finish Line" },
];

const WEEKS = [
  { num: 1, name: "Set the Bar High" },
  { num: 2, name: "Onboard Your Chief of Staff" },
  { num: 3, name: "Build Your First Skill" },
  { num: 4, name: "Put AI to Work" },
];

let state = { members: [], checks: {}, meta: {} };
let activeWeek = "all";
let pendingCells = new Set();

async function api(params) {
  if (params.method === "GET") {
    const url = API + "?action=" + params.action;
    const r = await fetch(url);
    return r.json();
  } else {
    const r = await fetch(API, {
      method: "POST",
      body: JSON.stringify(params),
    });
    return r.json();
  }
}

const LS_CACHE_KEY = "c5k_cache_v1";

async function loadAll(showCacheFirst = false) {
  if (showCacheFirst) {
    try {
      const cached = localStorage.getItem(LS_CACHE_KEY);
      if (cached) { state = JSON.parse(cached); render(); }
    } catch(e) {}
  }
  try {
    const data = await api({ method: "GET", action: "getAll" });
    state = data;
    try { localStorage.setItem(LS_CACHE_KEY, JSON.stringify(data)); } catch(e) {}
    render();
  } catch(e) {
    if (!showCacheFirst) {
      document.getElementById("tbody").innerHTML = `<tr><td colspan="35" class="loading-overlay" style="color:#B91C1C;">Failed to load. Check your Apps Script URL.</td></tr>`;
    }
  }
}

async function addMember() {
  const input = document.getElementById("nameInput");
  const name = input.value.trim();
  if (!name) return;
  const btn = document.getElementById("addBtn");
  btn.disabled = true;
  btn.textContent = "Adding...";
  try {
    const res = await api({ action: "addMember", name });
    if (res.ok) {
      input.value = "";
      if (!state.meta[name]) state.meta[name] = {};
      state.meta[name].joined_at = res.joined_at;
      showToast("Welcome, " + name + "! 🎉");
      await loadAll();
    } else {
      showToast("Name already exists!");
    }
  } finally {
    btn.disabled = false;
    btn.textContent = "+ Join";
  }
}

async function removeMember(name) {
  if (!confirm("Remove " + name + " from the tracker?")) return;
  await api({ action: "removeMember", name });
  showToast(name + " removed.");
  await loadAll();
}

async function toggle(name, day, cellEl) {
  const key = name + "_" + day;
  if (pendingCells.has(key)) return;
  pendingCells.add(key);
  cellEl.classList.add("loading");

  if (!state.checks[name]) state.checks[name] = {};
  const prev = state.checks[name][day];
  state.checks[name][day] = !prev;
  renderTable();

  try {
    const res = await api({ action: "toggle", name, day });
    if (res.completed_at !== undefined) {
      if (!state.meta[name]) state.meta[name] = {};
      state.meta[name].completed_at = res.completed_at;
      renderTable();
    }
  } catch(e) {
    state.checks[name][day] = prev;
    renderTable();
    showToast("Error saving. Try again.");
  } finally {
    pendingCells.delete(key);
  }
  renderStats();
}

function visibleDays() {
  return activeWeek === "all" ? DAYS : DAYS.filter(d => d.week === activeWeek);
}

function memberProgress(name) {
  const done = DAYS.filter(d => state.checks[name] && state.checks[name][d.day]).length;
  return { done, total: DAYS.length, pct: Math.round(done / DAYS.length * 100) };
}

function renderStats() {
  const members = state.members || [];
  const totalChecks = members.reduce((a, m) => a + DAYS.filter(d => state.checks[m] && state.checks[m][d.day]).length, 0);
  const leaders = [...members].sort((a, b) => memberProgress(b).done - memberProgress(a).done);
  document.getElementById("stat-members").textContent = members.length;
  document.getElementById("stat-completions").textContent = totalChecks;
  const leaderName = leaders[0] || "—";
  document.getElementById("stat-leader").textContent = leaderName.length > 8 ? leaderName.slice(0, 8) + "…" : leaderName;
}

function renderWeekNav() {
  const el = document.getElementById("weekNav");
  el.innerHTML = `<button class="week-btn ${activeWeek === 'all' ? 'active' : ''}" onclick="setWeek('all')">All weeks</button>` +
    WEEKS.map(w => `<button class="week-btn ${activeWeek === w.num ? 'active' : ''}" onclick="setWeek(${w.num})">Week ${w.num} <span style="font-weight:400;opacity:0.8;">· ${w.name}</span></button>`).join("");
}

function setWeek(w) {
  activeWeek = w;
  renderWeekNav();
  renderTable();
}

function renderTable() {
  const days = visibleDays();
  const members = state.members || [];

  document.getElementById("thead").innerHTML = `<tr>
    <th class="name-col">Name</th>
    ${days.map(d => `<th title="Day ${d.day}: ${d.title}"><div class="day-head"><span class="day-num">D${d.day}</span><span class="day-title-tip">${d.title}</span></div></th>`).join("")}
    <th class="prog-col">Progress</th>
    <th style="min-width:90px;text-align:left;padding-left:8px;">Joined</th>
    <th style="min-width:90px;text-align:left;padding-left:8px;">Finished</th>
    <th></th>
  </tr>`;

  if (members.length === 0) {
    document.getElementById("tbody").innerHTML = `<tr><td colspan="${days.length + 3}">
      <div class="empty-state">
        <p>No participants yet!</p>
        <small>Enter your name above to join the group tracker.</small>
      </div>
    </td></tr>`;
    return;
  }

  const sorted = [...members].sort((a, b) => memberProgress(b).done - memberProgress(a).done);

  document.getElementById("tbody").innerHTML = sorted.map((name, idx) => {
    const p = memberProgress(name);
    const cells = days.map(d => {
      const done = state.checks[name] && state.checks[name][d.day];
      const key = name + "_" + d.day;
      const loading = pendingCells.has(key);
      return `<td class="day-cell ${done ? 'done' : ''} ${loading ? 'loading' : ''}"
        onclick="toggle('${name.replace(/'/g,"\\'")}', ${d.day}, this)"
        title="Day ${d.day}: ${d.title}">${done ? "✅" : "⬜"}</td>`;
    }).join("");

    const medal = idx === 0 && p.done > 0 ? "🥇 " : "";
    const m = state.meta[name] || {};
    const joinedStr = m.joined_at ? fmtDate(m.joined_at) : "—";
    const completedStr = m.completed_at ? fmtDate(m.completed_at) : "—";

    return `<tr>
      <td class="name-col">${medal}${name}</td>
      ${cells}
      <td class="progress-col">
        <div class="prog-bar"><div class="prog-fill" style="width:${p.pct}%"></div></div>
        <div class="prog-text">${p.done}/${p.total} · ${p.pct}%</div>
      </td>
      <td style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;text-align:left;padding-left:8px;white-space:nowrap;">${joinedStr}</td>
      <td style="font-size:11px;color:${m.completed_at ? 'var(--success)' : 'var(--muted)'};font-family:'DM Mono',monospace;text-align:left;padding-left:8px;white-space:nowrap;">${completedStr}</td>
      <td><button class="remove-btn" onclick="removeMember('${name.replace(/'/g,"\\'")}')">×</button></td>
    </tr>`;
  }).join("");
}

function fmtDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "2-digit" });
}

function render() {
  renderStats();
  renderWeekNav();
  renderTable();
}

function exportCSV() {
  const members = state.members || [];
  const rows = [["Name", ...DAYS.map(d => `Day ${d.day} - ${d.title}`), "Total"]];
  members.forEach(name => {
    const checks = DAYS.map(d => state.checks[name] && state.checks[name][d.day] ? "1" : "0");
    const total = checks.filter(c => c === "1").length;
    rows.push([name, ...checks, total]);
  });
  const csv = rows.map(r => r.map(c => `"${c}"`).join(",")).join("\n");
  const a = document.createElement("a");
  a.href = "data:text/csv;charset=utf-8," + encodeURIComponent(csv);
  a.download = "c5k_progress.csv";
  a.click();
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

document.getElementById("nameInput").addEventListener("keydown", e => { if (e.key === "Enter") addMember(); });

loadAll(true);
setInterval(() => loadAll(false), 30000);
</script>
</body>
</html>
